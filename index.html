<!DOCTYPE html>
<html>
<head>
    <title>D-Day Canada: Advanced Tactics</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; font-family: 'Courier New', monospace; }
        canvas { display: block; background: #3a5c3a; }
        #ui { position: absolute; top: 10px; left: 10px; color: white; text-shadow: 1px 1px 2px black; pointer-events: none; }
        #msg { position: absolute; top: 20%; width: 100%; text-align: center; color: yellow; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 4px black; display: none; }
        .bar { background: #555; width: 200px; height: 20px; border: 2px solid #000; margin-top: 5px; position: relative; }
        .fill { height: 100%; background: #0f0; transition: width 0.2s; }
        #healthFill { background: #d00; }
        #ammoDisplay { position: absolute; bottom: 10px; right: 10px; color: white; font-size: 20px; text-shadow: 1px 1px 2px black; }
        #minimap { position: absolute; bottom: 10px; left: 10px; border: 2px solid #000; background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="ui">
    <div>HEALTH</div>
    <div class="bar"><div id="healthFill" class="fill" style="width:100%"></div></div>
    <div>STAMINA</div>
    <div class="bar"><div id="staminaFill" class="fill" style="width:100%"></div></div>
    <div>TEAM STATUS: <span id="teamStatus">Active</span></div>
</div>
<div id="msg"></div>
<div id="ammoDisplay">Rifle: ∞ | Grenades: 3</div>
<canvas id="gameCanvas"></canvas>
<canvas id="minimap" width="150" height="150"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const mmCanvas = document.getElementById('minimap');
const mmCtx = mmCanvas.getContext('2d');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Game State
let gameState = 'playing'; // playing, won, lost
let keys = {};
let mouse = { x: 0, y: 0, down: false };
let camera = { x: 0, y: 0 };
let worldWidth = 3000;
let worldHeight = 3000;

// Entities
let player = {
    x: worldWidth/2, y: worldHeight - 200, w: 20, h: 20, 
    speed: 4, health: 100, maxHealth: 100, stamina: 100, 
    angle: 0, team: 'ally', grenades: 3, hidden: false
};

let allies = [];
let enemies = [];
let bullets = [];
let grenades = [];
let particles = [];
let walls = [];
let buildings = [];

// Constants
const ALERT_RANGE = 600;
const ENEMY_SPAWN_MIN_DIST = 900; // Ensure spawn far away

// Input Handling
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', () => mouse.down = true);
window.addEventListener('mouseup', () => mouse.down = false);
window.addEventListener('resize', () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});

// Helper Functions
function dist(x1, y1, x2, y2) { return Math.hypot(x2-x1, y2-y1); }

function hasLineOfSight(x1, y1, x2, y2) {
    const steps = dist(x1, y1, x2, y2) / 20;
    const dx = (x2 - x1) / steps;
    const dy = (y2 - y1) / steps;
    
    for (let i = 0; i < steps; i++) {
        const cx = x1 + dx * i;
        const cy = y1 + dy * i;
        
        // Check Walls
        for (let w of walls) {
            if (cx > w.x && cx < w.x + w.w && cy > w.y && cy < w.y + w.h) return false;
        }
        // Check Buildings
        for (let b of buildings) {
            if (cx > b.x && cx < b.x + b.w && cy > b.y && cy < b.y + b.h) return false;
        }
    }
    return true;
}

function createMap() {
    walls = [];
    buildings = [];
    // Random obstacles
    for(let i=0; i<40; i++) {
        let w = 50 + Math.random()*150;
        let h = 50 + Math.random()*150;
        let x = Math.random() * (worldWidth - w);
        let y = Math.random() * (worldHeight - h);
        // Keep spawn area clear
        if (dist(x, y, player.x, player.y) > 400) {
            if(Math.random() > 0.3) walls.push({x, y, w, h});
            else buildings.push({x, y, w, h, color: '#554433'});
        }
    }
}

function spawnAllies() {
    allies = [];
    for(let i=0; i<4; i++) {
        allies.push({
            x: player.x + (Math.random()-0.5)*100,
            y: player.y + (Math.random()-0.5)*100,
            w: 20, h: 20, speed: 3.8, health: 100, maxHealth: 100,
            angle: 0, state: 'follow', target: null, cooldown: 0, grenades: 2
        });
    }
}

function spawnEnemies() {
    enemies = [];
    const types = ['soldier', 'soldier', 'machinegun', 'officer', 'sniper'];
    
    for(let i=0; i<25; i++) {
        let type = types[Math.floor(Math.random() * types.length)];
        let ex, ey, d;
        
        // Ensure spawn is FAR away and out of line of sight initially
        do {
            // Spawn in top 40% of map mostly
            ex = Math.random() * worldWidth;
            ey = Math.random() * (worldHeight * 0.4); 
            d = dist(ex, ey, player.x, player.y);
        } while(d < ENEMY_SPAWN_MIN_DIST || hasLineOfSight(player.x, player.y, ex, ey));

        let hp = 100, spd = 2, range = 600, dmg = 10, color = '#a33';
        if(type === 'machinegun') { hp=140; spd=1.5; color='#822'; }
        if(type === 'officer') { hp=120; spd=2.5; color='#a55'; }
        if(type === 'sniper') { hp=80; spd=1.8; range=800; dmg=25; color='#522'; }

        enemies.push({
            x: ex, y: ey, w: 20, h: 20, speed: spd, health: hp, maxHealth: hp,
            type: type, angle: 0, state: 'hidden', // Start hidden
            alertRange: range, damage: dmg, color: color,
            cooldown: 0, grenades: (type==='soldier'?2:0), lastSeen: 0
        });
    }
}

function updatePlayer() {
    if(gameState !== 'playing') return;
    
    // Movement
    let dx = 0, dy = 0;
    let spd = player.speed;
    if(keys['shift'] && player.stamina > 0) { spd *= 1.6; player.stamina -= 0.5; }
    else if(player.stamina < 100) player.stamina += 0.2;

    if(keys['w']) dy = -spd;
    if(keys['s']) dy = spd;
    if(keys['a']) dx = -spd;
    if(keys['d']) dx = spd;

    // Collision with walls/buildings
    let nextX = player.x + dx;
    let nextY = player.y + dy;
    let collided = false;
    
    [...walls, ...buildings].forEach(obj => {
        if(nextX > obj.x-10 && nextX < obj.x+obj.w+10 && nextY > obj.y-10 && nextY < obj.y+obj.h+10) collided = true;
    });

    if(!collided) { player.x = nextX; player.y = nextY; }
    
    // Clamp to world
    player.x = Math.max(0, Math.min(worldWidth, player.x));
    player.y = Math.max(0, Math.min(worldHeight, player.y));

    // Aim
    player.angle = Math.atan2(mouse.y - (player.y - camera.y), mouse.x - (player.x - camera.x));

    // Shoot
    if(mouse.down && player.cooldown <= 0) {
        bullets.push({
            x: player.x, y: player.y, 
            vx: Math.cos(player.angle)*15, vy: Math.sin(player.angle)*15,
            life: 100, team: 'ally'
        });
        player.cooldown = 8;
    }
    if(player.cooldown > 0) player.cooldown--;

    // Throw Grenade
    if(keys['g'] && player.grenades > 0 && !player.grenadeThrown) {
        grenades.push({
            x: player.x, y: player.y,
            vx: Math.cos(player.angle)*8, vy: Math.sin(player.angle)*8,
            life: 120, team: 'ally', gravity: 0.15
        });
        player.grenades--;
        player.grenadeThrown = true;
        setTimeout(() => player.grenadeThrown = false, 500);
    }
}

function updateAllies() {
    allies.forEach(ally => {
        let dToPlayer = dist(ally.x, ally.y, player.x, player.y);
        let nearestEnemy = null;
        let minDist = 500;

        // Find Target
        enemies.forEach(en => {
            if(en.health > 0 && en.state !== 'hidden') {
                let d = dist(ally.x, ally.y, en.x, en.y);
                if(d < minDist && hasLineOfSight(ally.x, ally.y, en.x, en.y)) {
                    minDist = d;
                    nearestEnemy = en;
                }
            }
        });

        // State Machine
        if(nearestEnemy) {
            ally.target = nearestEnemy;
            ally.state = 'fight';
            // Move to cover or flank
            if(dToPlayer < 200 && Math.random()<0.02) {
                 // Flank logic: move perpendicular to enemy
                 let angleToEnemy = Math.atan2(nearestEnemy.y - ally.y, nearestEnemy.x - ally.x);
                 ally.x += Math.cos(angleToEnemy + Math.PI/2) * 50;
                 ally.y += Math.sin(angleToEnemy + Math.PI/2) * 50;
            }
        } else if(dToPlayer > 150) {
            ally.state = 'follow';
        } else {
            ally.state = 'idle';
        }

        // Execute State
        if(ally.state === 'follow') {
            let angle = Math.atan2(player.y - ally.y, player.x - ally.x);
            ally.x += Math.cos(angle) * ally.speed;
            ally.y += Math.sin(angle) * ally.speed;
            ally.angle = angle;
        } else if(ally.state === 'fight' && ally.target) {
            let angle = Math.atan2(ally.target.y - ally.y, ally.target.x - ally.x);
            ally.angle = angle;
            
            // Keep distance
            if(minDist < 200) {
                ally.x -= Math.cos(angle) * ally.speed;
                ally.y -= Math.sin(angle) * ally.speed;
            }

            // Shoot
            if(ally.cooldown <= 0 && hasLineOfSight(ally.x, ally.y, ally.target.x, ally.target.y)) {
                bullets.push({
                    x: ally.x, y: ally.y,
                    vx: Math.cos(angle)*12, vy: Math.sin(angle)*12,
                    life: 80, team: 'ally'
                });
                ally.cooldown = 15;
            }
            
            // Grenade
            if(ally.grenades > 0 && minDist > 150 && minDist < 400 && Math.random() < 0.01) {
                 grenades.push({
                    x: ally.x, y: ally.y,
                    vx: Math.cos(angle)*7, vy: Math.sin(angle)*7,
                    life: 100, team: 'ally', gravity: 0.15
                });
                ally.grenades--;
            }
        }
        if(ally.cooldown > 0) ally.cooldown--;
        
        // Ally Collision with walls
        [...walls, ...buildings].forEach(obj => {
             if(ally.x > obj.x && ally.x < obj.x+obj.w && ally.y > obj.y && ally.y < obj.y+obj.h) {
                 ally.x -= Math.cos(ally.angle)*5;
                 ally.y -= Math.sin(ally.angle)*5;
             }
        });
    });
}

function updateEnemies() {
    enemies.forEach(en => {
        if(en.health <= 0) return;

        let dToPlayer = dist(en.x, en.y, player.x, player.y);
        let los = hasLineOfSight(en.x, en.y, player.x, player.y);

        // Reveal Logic
        if(en.state === 'hidden') {
            if(dToPlayer < 500 && los) {
                en.state = 'alert';
            }
        }

        if(en.state === 'alert' || en.state === 'fight') {
            // Lose interest if no LOS for long
            if(!los) en.lastSeen++;
            else en.lastSeen = 0;

            if(en.lastSeen > 180) {
                en.state = 'hidden'; // Hide again
                return;
            }

            // Coordination: Alert others
            if(en.state === 'alert') {
                enemies.forEach(other => {
                    if(other !== en && dist(en.x, en.y, other.x, other.y) < 400) {
                        other.state = 'alert';
                    }
                });
                en.state = 'fight';
            }

            // Movement & Shooting
            let angle = Math.atan2(player.y - en.y, player.x - en.x);
            en.angle = angle;

            // Retreat if low health
            if(en.health < en.maxHealth * 0.25 && dToPlayer < 300) {
                en.x += Math.cos(angle) * en.speed;
                en.y += Math.sin(angle) * en.speed;
            } 
            // Move to optimal range
            else if(dToPlayer > en.alertRange - 50) {
                en.x += Math.cos(angle) * en.speed;
                en.y += Math.sin(angle) * en.speed;
            } else if(dToPlayer < 150) {
                en.x -= Math.cos(angle) * en.speed;
                en.y -= Math.sin(angle) * en.speed;
            }

            // Shooting Logic
            if(los && en.cooldown <= 0) {
                let spread = 0.1;
                if(en.type === 'machinegun') { spread = 0.2; en.cooldown = 5; }
                else if(en.type === 'sniper') { spread = 0.01; en.cooldown = 60; }
                else { en.cooldown = 20; }

                bullets.push({
                    x: en.x, y: en.y,
                    vx: Math.cos(angle + (Math.random()-0.5)*spread)*12, 
                    vy: Math.sin(angle + (Math.random()-0.5)*spread)*12,
                    life: 100, team: 'enemy', damage: en.damage
                });
            }

            // Grenade Logic
            if(en.grenades > 0 && dToPlayer > 200 && dToPlayer < 500 && los && Math.random() < 0.02) {
                grenades.push({
                    x: en.x, y: en.y,
                    vx: Math.cos(angle)*6, vy: Math.sin(angle)*6,
                    life: 100, team: 'enemy', gravity: 0.15
                });
                en.grenades--;
            }
        }
        
        // Wall collision for enemies
        [...walls, ...buildings].forEach(obj => {
             if(en.x > obj.x && en.x < obj.x+obj.w && en.y > obj.y && en.y < obj.y+obj.h) {
                 en.x -= Math.cos(en.angle)*5;
                 en.y -= Math.sin(en.angle)*5;
             }
        });
    });
}

function updateBullets() {
    for(let i=bullets.length-1; i>=0; i--) {
        let b = bullets[i];
        b.x += b.vx;
        b.y += b.vy;
        b.life--;

        let hit = false;
        // Hit Walls
        for(let w of walls) {
            if(b.x > w.x && b.x < w.x+w.w && b.y > w.y && b.y < w.y+w.h) hit = true;
        }
        // Hit Buildings
        for(let bld of buildings) {
            if(b.x > bld.x && b.x < bld.x+bld.w && b.y > bld.y && b.y < bld.y+bld.h) hit = true;
        }

        if(hit || b.life <= 0) {
            bullets.splice(i, 1);
            continue;
        }

        // Hit Entities
        if(b.team === 'ally') {
            for(let en of enemies) {
                if(en.health > 0 && dist(b.x, b.y, en.x, en.y) < 15) {
                    en.health -= 15;
                    if(en.health <= 0) createParticles(en.x, en.y, '#a00');
                    hit = true; break;
                }
            }
        } else {
            if(dist(b.x, b.y, player.x, player.y) < 15) {
                player.health -= b.damage || 10;
                hit = true;
            }
            for(let al of allies) {
                if(dist(b.x, b.y, al.x, al.y) < 15) {
                    al.health -= 10;
                    hit = true; break;
                }
            }
        }
        if(hit) bullets.splice(i, 1);
    }
}

function updateGrenades() {
    for(let i=grenades.length-1; i>=0; i--) {
        let g = grenades[i];
        g.vx *= 0.98; g.vy *= 0.98;
        g.vy += g.gravity;
        g.x += g.vx; g.y += g.vy;
        g.life--;

        if(g.life <= 0) {
            // Explosion
            for(let en of enemies) {
                if(dist(g.x, g.y, en.x, en.y) < 100) en.health -= 50;
            }
            for(let al of allies) {
                if(dist(g.x, g.y, al.x, al.y) < 100) al.health -= 50;
            }
            if(dist(g.x, g.y, player.x, player.y) < 100) player.health -= 50;
            createParticles(g.x, g.y, '#fa0', 20);
            grenades.splice(i, 1);
        }
    }
}

function createParticles(x, y, color, count=5) {
    for(let i=0; i<count; i++) {
        particles.push({
            x: x, y: y,
            vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5,
            life: 30, color: color
        });
    }
}

function draw() {
    // Clear
    ctx.fillStyle = '#3a5c3a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Camera Follow
    camera.x = player.x - canvas.width/2;
    camera.y = player.y - canvas.height/2;
    camera.x = Math.max(0, Math.min(worldWidth-canvas.width, camera.x));
    camera.y = Math.max(0, Math.min(worldHeight-canvas.height, camera.y));

    ctx.save();
    ctx.translate(-camera.x, -camera.y);

    // Draw World Bounds
    ctx.strokeStyle = '#000';
    ctx.strokeRect(0, 0, worldWidth, worldHeight);

    // Draw Terrain
    ctx.fillStyle = '#4a6c4a';
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));
    ctx.fillStyle = '#554433';
    buildings.forEach(b => ctx.fillRect(b.x, b.y, b.w, b.h));

    // Draw Dead Bodies
    enemies.forEach(en => {
        if(en.health <= 0) {
            ctx.fillStyle = '#300';
            ctx.beginPath(); ctx.arc(en.x, en.y, 10, 0, Math.PI*2); ctx.fill();
        }
    });

    // Draw Allies
    allies.forEach(al => {
        if(al.health <= 0) return;
        ctx.save();
        ctx.translate(al.x, al.y);
        ctx.rotate(al.angle);
        ctx.fillStyle = '#44f';
        ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, -5, 25, 5); // Gun
        ctx.restore();
        // Health bar
        ctx.fillStyle = 'red'; ctx.fillRect(al.x-10, al.y-20, 20, 4);
        ctx.fillStyle = '#0f0'; ctx.fillRect(al.x-10, al.y-20, 20*(al.health/al.maxHealth), 4);
    });

    // Draw Enemies (Only if not hidden)
    enemies.forEach(en => {
        if(en.health <= 0 || en.state === 'hidden') return;
        ctx.save();
        ctx.translate(en.x, en.y);
        ctx.rotate(en.angle);
        ctx.fillStyle = en.color;
        ctx.fillRect(-10, -10, 20, 20);
        ctx.fillStyle = '#000';
        ctx.fillRect(0, -5, 25, 5);
        ctx.restore();
        // Health bar
        ctx.fillStyle = 'red'; ctx.fillRect(en.x-10, en.y-20, 20, 4);
        ctx.fillStyle = '#0f0'; ctx.fillRect(en.x-10, en.y-20, 20*(en.health/en.maxHealth), 4);
    });

    // Draw Player
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    ctx.fillStyle = '#4f4';
    ctx.fillRect(-10, -10, 20, 20);
    ctx.fillStyle = '#000';
    ctx.fillRect(0, -5, 30, 5);
    ctx.restore();

    // Draw Bullets
    ctx.fillStyle = '#ff0';
    bullets.forEach(b => {
        ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI*2); ctx.fill();
    });

    // Draw Grenades
    ctx.fillStyle = '#000';
    grenades.forEach(g => {
        ctx.beginPath(); ctx.arc(g.x, g.y, 6, 0, Math.PI*2); ctx.fill();
    });

    // Draw Particles
    particles.forEach((p, i) => {
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x, p.y, 4, 4);
        p.x += p.vx; p.y += p.vy; p.life--;
        if(p.life <= 0) particles.splice(i, 1);
    });

    ctx.restore();

    // UI Updates
    document.getElementById('healthFill').style.width = player.health + '%';
    document.getElementById('staminaFill').style.width = player.stamina + '%';
    document.getElementById('ammoDisplay').innerText = `Rifle: ∞ | Grenades: ${player.grenades}`;
    
    let aliveAllies = allies.filter(a => a.health > 0).length;
    document.getElementById('teamStatus').innerText = `${aliveAllies} Squad Members Active`;
    document.getElementById('teamStatus').style.color = aliveAllies > 0 ? '#0f0' : '#f00';

    if(player.health <= 0) {
        gameState = 'lost';
        document.getElementById('msg').style.display = 'block';
        document.getElementById('msg').innerText = "MISSION FAILED - REFRESH TO RESTART";
    }
    
    let aliveEnemies = enemies.filter(e => e.health > 0).length;
    if(aliveEnemies === 0 && gameState === 'playing') {
        gameState = 'won';
        document.getElementById('msg').style.display = 'block';
        document.getElementById('msg').innerText = "SECTOR CLEARED - VICTORY!";
        document.getElementById('msg').style.color = "#0f0";
    }

    drawMinimap();
    requestAnimationFrame(draw);
}

function drawMinimap() {
    mmCtx.clearRect(0, 0, 150, 150);
    mmCtx.fillStyle = '#232';
    mmCtx.fillRect(0, 0, 150, 150);
    
    let scaleX = 150/worldWidth;
    let scaleY = 150/worldHeight;

    mmCtx.fillStyle = '#554433';
    buildings.forEach(b => mmCtx.fillRect(b.x*scaleX, b.y*scaleY, b.w*scaleX, b.h*scaleY));

    mmCtx.fillStyle = '#f00';
    enemies.forEach(en => {
        if(en.health > 0 && en.state !== 'hidden') 
            mmCtx.fillRect(en.x*scaleX, en.y*scaleY, 3, 3);
    });

    mmCtx.fillStyle = '#0f0';
    mmCtx.fillRect(player.x*scaleX-2, player.y*scaleY-2, 4, 4);
    
    mmCtx.fillStyle = '#00f';
    allies.forEach(al => {
        if(al.health > 0) mmCtx.fillRect(al.x*scaleX, al.y*scaleY, 3, 3);
    });
}

function loop() {
    updatePlayer();
    updateAllies();
    updateEnemies();
    updateBullets();
    updateGrenades();
}
setInterval(loop, 1000/60);

// Init
createMap();
spawnAllies();
spawnEnemies();
draw();

</script>
</body>
</html>
